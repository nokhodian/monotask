<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P2P Kanban</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a12; color: #ccc; font-family: system-ui, sans-serif; font-size: 14px; }

    /* ── Layout ────────────────────────────────────────────────────────── */
    body { display: flex; flex-direction: row; height: 100vh; overflow: hidden; }

    /* ── Spaces sidebar ────────────────────────────────────────────────── */
    #spaces-sidebar {
      width: 200px; min-width: 160px;
      background: #0d0d1a;
      border-right: 1px solid #1e1e3a;
      display: flex; flex-direction: column;
      padding: 12px 8px;
      flex-shrink: 0;
    }
    .sidebar-header {
      display: flex; justify-content: space-between; align-items: center;
      color: #c8962a; font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.1em; margin-bottom: 8px; padding: 0 4px;
    }
    .sidebar-header button {
      background: none; border: 1px solid #3a2a0a; color: #c8962a;
      width: 20px; height: 20px; border-radius: 3px; cursor: pointer;
      font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center;
    }
    .sidebar-header button:hover { background: #1e1a08; }
    #spaces-list { list-style: none; padding: 0; margin: 0; flex: 1; overflow-y: auto; }
    /* space row */
    .space-row {
      display: flex; align-items: center; gap: 4px;
      padding: 5px 6px 5px 10px; cursor: pointer; border-radius: 4px;
      color: #888; font-size: 13px;
    }
    .space-row:hover { color: #ccc; background: #141426; }
    .space-row.active { color: #eee; background: #1a1a2e; border-left: 2px solid #c8962a; }
    .space-row-arrow {
      font-size: 9px; color: #444; transition: transform 0.15s; flex-shrink: 0; width: 10px;
    }
    .space-row.open .space-row-arrow { transform: rotate(90deg); }
    .space-row-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* boards under space */
    .space-boards-sub {
      list-style: none; padding: 0; margin: 0 0 2px 0; display: none;
    }
    .space-boards-sub.open { display: block; }
    .space-boards-sub li {
      padding: 4px 10px 4px 26px; cursor: pointer; border-radius: 4px;
      color: #666; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: center; gap: 6px;
    }
    .space-boards-sub li::before { content: '▣'; font-size: 9px; color: #444; flex-shrink: 0; }
    .space-boards-sub li:hover { color: #ccc; background: #141426; }
    .space-boards-sub li.active { color: #c8962a; background: #1a1608; }
    .sidebar-section-label {
      font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 0.1em;
      padding: 12px 10px 4px; margin-top: 4px;
    }
    .sidebar-footer { border-top: 1px solid #1e1e3a; padding-top: 8px; margin-top: 4px; }
    .sidebar-footer button {
      width: 100%; background: none; border: none; color: #555; cursor: pointer;
      font-size: 12px; text-align: left; padding: 6px 10px; border-radius: 4px;
    }
    .sidebar-footer button:hover { color: #c8962a; background: #141426; }

    /* ── Main content area ─────────────────────────────────────────────── */
    #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Board dashboard (empty state) ────────────────────────────────── */
    #board-dashboard {
      flex: 1; padding: 32px; overflow-y: auto;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .board-placeholder { text-align: center; color: #333; }
    .board-placeholder h2 { font-size: 20px; color: #444; margin-bottom: 12px; }
    .board-placeholder p { font-size: 13px; color: #333; max-width: 320px; }

    /* ── Space main view (boards grid + settings) ──────────────────────── */
    #space-main {
      flex: 1; display: none; flex-direction: column; overflow: hidden;
    }

    /* Top bar */
    .space-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 24px 0; border-bottom: 1px solid #1a1a2e; padding-bottom: 14px;
      flex-shrink: 0;
    }
    #btn-back-to-boards {
      background: none; border: 1px solid #2a2a3a; color: #666;
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    #btn-back-to-boards:hover { color: #ccc; border-color: #3a3a5a; }
    .space-topbar h2 { font-size: 16px; color: #eee; flex: 1; font-weight: 600; }
    #btn-space-settings {
      background: none; border: 1px solid #2a2a3a; color: #666;
      padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    #btn-space-settings:hover { color: #c8962a; border-color: #5a3a0a; }

    /* Boards grid */
    #boards-grid-area {
      flex: 1; padding: 24px; overflow-y: auto;
    }
    .boards-grid-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .boards-grid-header h3 { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 0.1em; }
    .boards-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .board-card {
      background: #0e0e1c; border: 1px solid #1e1e36;
      border-radius: 8px; padding: 18px 16px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex; flex-direction: column; gap: 8px;
      min-height: 90px;
    }
    .board-card:hover { background: #131326; border-color: #c8962a44; }
    .board-card-title { font-size: 14px; color: #ddd; font-weight: 500; }
    .board-card-id { font-size: 10px; color: #333; font-family: monospace; }
    .board-card-badge {
      display: inline-block; background: #1a2a1a; color: #4a904a;
      border: 1px solid #2a502a; border-radius: 3px;
      padding: 1px 6px; font-size: 10px; align-self: flex-start;
    }
    .boards-empty { color: #444; font-size: 13px; padding: 20px 0; }

    /* Board view (columns + cards) */
    #board-view {
      flex: 1; display: none; flex-direction: column; overflow: hidden;
    }
    .board-view-topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; border-bottom: 1px solid #1a1a2e; flex-shrink: 0;
    }
    #btn-back-to-space {
      background: none; border: 1px solid #2a2a3a; color: #666;
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    #btn-back-to-space:hover { color: #ccc; border-color: #3a3a5a; }
    .board-view-topbar h2 { font-size: 15px; color: #eee; flex: 1; font-weight: 600; }
    #btn-add-column {
      background: none; border: 1px solid #2a2a3a; color: #666;
      padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    #btn-add-column:hover { color: #c8962a; border-color: #5a3a0a; }
    #board-columns-area {
      flex: 1; padding: 16px 20px; overflow-x: auto; overflow-y: hidden;
      display: flex; gap: 14px; align-items: flex-start;
    }
    .board-col {
      background: #0d0d1c; border: 1px solid #1a1a30;
      border-radius: 8px; min-width: 230px; width: 230px; flex-shrink: 0;
      display: flex; flex-direction: column; max-height: calc(100vh - 130px);
    }
    .board-col-header {
      padding: 10px 12px 10px 14px; font-size: 11px; color: #777;
      text-transform: uppercase; letter-spacing: 0.08em;
      border-bottom: 1px solid #1a1a30; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .board-col-count {
      background: #1a1a2e; color: #555; font-size: 10px;
      border-radius: 8px; padding: 1px 7px; font-family: monospace;
    }
    .board-col-cards {
      list-style: none; padding: 8px; overflow-y: auto; flex: 1;
      display: flex; flex-direction: column; gap: 6px;
    }
    .kanban-card {
      background: #131326; border: 1px solid #1e1e3a;
      border-radius: 6px; padding: 9px 11px; cursor: default;
      transition: border-color 0.12s;
    }
    .kanban-card:hover { border-color: #2e2e5a; }
    .kanban-card-title { font-size: 13px; color: #ccc; line-height: 1.4; }
    .kanban-card-num { font-size: 10px; color: #3a3a5a; font-family: monospace; margin-top: 5px; }
    .board-col-add {
      flex-shrink: 0; padding: 6px 8px;
      border-top: 1px solid #141428;
    }
    .btn-add-card {
      width: 100%; background: none; border: 1px dashed #1e1e3a;
      color: #444; font-size: 12px; border-radius: 5px;
      padding: 5px; cursor: pointer; text-align: left;
    }
    .btn-add-card:hover { color: #888; border-color: #2e2e5a; background: #0f0f1e; }
    .col-add-form { display: none; flex-direction: column; gap: 5px; padding: 4px 0; }
    .col-add-form.open { display: flex; }
    .col-add-form input { font-size: 12px; padding: 5px 8px; }
    .col-add-form-btns { display: flex; gap: 5px; }
    .col-add-form-btns button { font-size: 11px; padding: 3px 10px; flex: 1; }

    /* ── Space settings panel (replaces old space-panel) ──────────────── */
    #space-panel { flex: 1; padding: 24px; overflow-y: auto; display: none; flex-direction: column; }
    .space-panel-header {
      display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
      border-bottom: 1px solid #1e1e3a; padding-bottom: 16px;
    }
    .space-panel-header h2 { font-size: 18px; color: #eee; flex: 1; }
    #btn-settings-back {
      background: none; border: 1px solid #2a2a3a; color: #888;
      padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    #btn-settings-back:hover { color: #ccc; border-color: #3a3a5a; }
    .space-tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #1e1e3a; }
    .space-tab {
      background: none; border: none; color: #555; cursor: pointer;
      padding: 8px 20px; font-size: 13px; border-bottom: 2px solid transparent; margin-bottom: -1px;
    }
    .space-tab:hover { color: #999; }
    .space-tab.active { color: #c8962a; border-bottom-color: #c8962a; }
    .space-tab-content { display: none; }
    .space-tab-content.active { display: block; }

    /* Members */
    #space-members-list { list-style: none; padding: 0; }
    #space-members-list li {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid #141426;
    }
    .member-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      background: #1e1e3a; display: flex; align-items: center; justify-content: center;
      color: #c8962a; font-weight: bold; font-size: 14px;
    }
    .member-info { flex: 1; }
    .member-name { color: #ccc; font-size: 13px; }
    .member-pubkey { color: #444; font-size: 11px; font-family: monospace; margin-top: 2px; }
    .member-kicked { opacity: 0.35; }
    .member-kicked .member-name::after { content: ' [kicked]'; color: #c05050; font-size: 11px; }
    .btn-kick {
      background: none; border: 1px solid #3a1a1a; color: #c05050;
      cursor: pointer; padding: 3px 10px; border-radius: 3px; font-size: 11px;
    }
    .btn-kick:hover { background: #1a0a0a; }

    /* Boards tab in settings */
    #space-boards-list { list-style: none; padding: 0; margin-bottom: 16px; }
    #space-boards-list li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid #141426; font-size: 13px; color: #ccc;
    }
    .add-board-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }

    /* Invite tab */
    .invite-section { margin-bottom: 16px; }
    .invite-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .token-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
    .token-row input { flex: 1; background: #0d0d1a; border: 1px solid #1e1e3a; color: #aaa; padding: 6px 10px; border-radius: 4px; font-family: monospace; font-size: 11px; }
    #invite-qr { margin: 12px 0; }
    .invite-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }

    /* ── Modals ─────────────────────────────────────────────────────────── */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal.open { display: flex; }
    .modal-box {
      background: #131320; border: 1px solid #2a2a3a;
      border-radius: 8px; padding: 24px; min-width: 320px; max-width: 420px; width: 90%;
    }
    .modal-box h3 { font-size: 16px; color: #eee; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

    /* Profile modal */
    .profile-field { margin-bottom: 14px; }
    .profile-field label { display: block; color: #777; font-size: 11px; margin-bottom: 4px; }
    .pubkey-row { display: flex; align-items: center; gap: 8px; }
    .pubkey-display { font-family: monospace; font-size: 12px; color: #555; flex: 1; word-break: break-all; }

    /* ── Form controls ──────────────────────────────────────────────────── */
    input[type="text"], input:not([type]) {
      background: #0d0d1a; border: 1px solid #1e1e3a; color: #ccc;
      padding: 7px 10px; border-radius: 4px; font-size: 13px; width: 100%;
      outline: none;
    }
    input:focus { border-color: #2e2e5a; }
    select {
      background: #0d0d1a; border: 1px solid #1e1e3a; color: #ccc;
      padding: 6px 10px; border-radius: 4px; font-size: 13px; flex: 1;
    }
    button {
      background: #1a1a2e; border: 1px solid #2a2a4a; color: #ccc;
      padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    button:hover { background: #1e1e38; border-color: #3a3a6a; color: #eee; }
    .btn-primary { background: #1e2a3a; border-color: #3870c0; color: #5890e0; }
    .btn-primary:hover { background: #1e3050; }
    .btn-danger { border-color: #3a1a1a; color: #c05050; }
    .btn-danger:hover { background: #1a0808; }
    .btn-small { padding: 3px 8px; font-size: 11px; }
  </style>
</head>
<body>

<!-- ── Spaces sidebar ─────────────────────────────────────────────────────── -->
<div id="spaces-sidebar">
  <div class="sidebar-header">
    <span>Spaces</span>
    <button id="btn-new-space" title="New Space">+</button>
  </div>
  <ul id="spaces-list"></ul>
  <div class="sidebar-footer">
    <button id="btn-profile">&#9881; Profile</button>
    <button id="btn-import-invite-sidebar">&#8595; Join Space</button>
  </div>
</div>

<!-- ── Main content ───────────────────────────────────────────────────────── -->
<div id="main-content">

  <!-- Empty state (no space selected) -->
  <div id="board-dashboard">
    <div class="board-placeholder">
      <h2>P2P Kanban</h2>
      <p>Select a space from the sidebar<br/>or create one to get started.</p>
    </div>
  </div>

  <!-- Space main view: boards grid + board view -->
  <div id="space-main">
    <!-- Top bar -->
    <div class="space-topbar">
      <button id="btn-back-to-boards">&#8592;</button>
      <h2 id="space-main-name"></h2>
      <button id="btn-space-settings">&#9881; Settings</button>
    </div>

    <!-- Boards grid -->
    <div id="boards-grid-area">
      <div class="boards-grid-header">
        <h3>Boards</h3>
      </div>
      <div id="boards-grid" class="boards-grid"></div>
    </div>

    <!-- Board view (columns) -->
    <div id="board-view">
      <div class="board-view-topbar">
        <button id="btn-back-to-space">&#8592;</button>
        <h2 id="board-view-title"></h2>
        <button id="btn-add-column">+ Column</button>
      </div>
      <div id="board-columns-area"></div>
    </div>
  </div>

  <!-- Space settings panel (members / boards / invite) -->
  <div id="space-panel">
    <div class="space-panel-header">
      <button id="btn-settings-back">&#8592; Back</button>
      <h2 id="space-panel-name"></h2>
    </div>
    <div class="space-tabs">
      <button class="space-tab active" data-tab="members">Members</button>
      <button class="space-tab" data-tab="boards">Boards</button>
      <button class="space-tab" data-tab="invite">Invite</button>
    </div>

    <!-- Members tab -->
    <div id="tab-members" class="space-tab-content active">
      <ul id="space-members-list"></ul>
    </div>

    <!-- Boards tab -->
    <div id="tab-boards" class="space-tab-content">
      <ul id="space-boards-list"></ul>
      <div class="add-board-row">
        <input id="input-board-id-to-add" placeholder="Board ID to add" style="flex:1;" />
        <button id="btn-add-board-to-space" class="btn-primary">Add Board</button>
      </div>
    </div>

    <!-- Invite tab -->
    <div id="tab-invite" class="space-tab-content">
      <div id="invite-token-section" style="display:none;">
        <div class="invite-label">Invite Token</div>
        <div class="token-row">
          <input id="invite-token-input" readonly />
          <button id="btn-copy-token" class="btn-small">Copy</button>
        </div>
        <div id="invite-qr"></div>
        <div class="invite-actions">
          <button id="btn-export-invite">Export .space file</button>
          <button id="btn-revoke-invite" class="btn-danger">Revoke &amp; Regenerate</button>
        </div>
      </div>
      <div id="no-invite-section">
        <p style="color:#555;font-size:13px;margin-bottom:12px;">No active invite token.</p>
        <button id="btn-generate-invite" class="btn-primary">Generate Invite</button>
      </div>
    </div>
  </div>

</div><!-- end main-content -->

<!-- ── Create Space modal ─────────────────────────────────────────────────── -->
<div id="modal-create-space" class="modal">
  <div class="modal-box">
    <h3>New Space</h3>
    <div class="profile-field">
      <label>Space Name</label>
      <input id="input-space-name" placeholder="Team Alpha" />
    </div>
    <div class="modal-actions">
      <button id="btn-create-space-cancel">Cancel</button>
      <button id="btn-create-space-confirm" class="btn-primary">Create</button>
    </div>
  </div>
</div>

<!-- ── Import Invite modal ────────────────────────────────────────────────── -->
<div id="modal-import-invite" class="modal">
  <div class="modal-box">
    <h3>Join Space</h3>
    <div class="profile-field">
      <label>Invite Token or .space file path</label>
      <input id="input-invite-token" placeholder="Paste token or /path/to/file.space" />
    </div>
    <div class="modal-actions">
      <button id="btn-import-invite-cancel">Cancel</button>
      <button id="btn-import-invite-confirm" class="btn-primary">Join</button>
    </div>
  </div>
</div>

<!-- ── Profile modal ──────────────────────────────────────────────────────── -->
<div id="modal-profile" class="modal">
  <div class="modal-box">
    <h3>Profile</h3>
    <div class="profile-field">
      <label>Public Key</label>
      <div class="pubkey-row">
        <span id="profile-pubkey-short" class="pubkey-display"></span>
        <button id="btn-copy-pubkey" class="btn-small">Copy</button>
      </div>
    </div>
    <div class="profile-field">
      <label>Display Name</label>
      <input id="input-display-name" placeholder="Your name" />
    </div>
    <div class="profile-field">
      <label>SSH Key Path (optional &#8212; leave blank to use auto-generated key)</label>
      <div style="display:flex;gap:8px;">
        <input id="input-ssh-key-path" placeholder="~/.ssh/id_ed25519" />
        <button id="btn-import-ssh" class="btn-small">Import</button>
      </div>
    </div>
    <div class="modal-actions">
      <button id="btn-close-profile">Close</button>
      <button id="btn-save-profile" class="btn-primary">Save</button>
    </div>
  </div>
</div>

<script>
  const invoke = (...args) => window.__TAURI__.core.invoke(...args);

  // ── State ──────────────────────────────────────────────────────────────────
  let currentSpaceId = null;
  let currentSpaceData = null;
  let currentBoardId = null;
  // allBoards: map of boardId → title (loaded once, refreshed as needed)
  let allBoards = {};

  // ── View switcher ──────────────────────────────────────────────────────────
  // views: 'dashboard' | 'space-main' | 'board-view' | 'space-settings'
  function showView(view) {
    document.getElementById('board-dashboard').style.display = view === 'dashboard' ? '' : 'none';
    document.getElementById('space-main').style.display = view === 'space-main' ? 'flex' : 'none';
    document.getElementById('board-view').style.display = view === 'board-view' ? 'flex' : 'none';
    document.getElementById('space-panel').style.display = view === 'space-settings' ? 'flex' : 'none';
    // board-view is inside space-main, handled separately via flex
    if (view === 'space-main') {
      document.getElementById('boards-grid-area').style.display = 'block';
      document.getElementById('board-view').style.display = 'none';
    }
    if (view === 'board-view') {
      document.getElementById('space-main').style.display = 'flex';
      document.getElementById('boards-grid-area').style.display = 'none';
      document.getElementById('board-view').style.display = 'flex';
    }
  }

  // ── Modal helpers ──────────────────────────────────────────────────────────
  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  // ── Sidebar ────────────────────────────────────────────────────────────────
  // Track which spaces are expanded in the sidebar
  const expandedSpaces = new Set();

  async function loadSpacesSidebar() {
    const spaces = await invoke('list_spaces').catch(() => []);
    const list = document.getElementById('spaces-list');
    list.innerHTML = '';

    for (const s of spaces) {
      // Space row
      const row = document.createElement('div');
      row.className = 'space-row' +
        (s.id === currentSpaceId ? ' active' : '') +
        (expandedSpaces.has(s.id) ? ' open' : '');
      row.dataset.spaceId = s.id;

      const arrow = document.createElement('span');
      arrow.className = 'space-row-arrow';
      arrow.textContent = '▶';

      const name = document.createElement('span');
      name.className = 'space-row-name';
      name.textContent = s.name;

      row.appendChild(arrow);
      row.appendChild(name);

      // Boards sub-list
      const sub = document.createElement('ul');
      sub.className = 'space-boards-sub' + (expandedSpaces.has(s.id) ? ' open' : '');
      sub.dataset.spaceId = s.id;

      // Click space row: expand/collapse + navigate to space main
      row.onclick = () => {
        if (expandedSpaces.has(s.id)) {
          expandedSpaces.delete(s.id);
          row.classList.remove('open');
          sub.classList.remove('open');
        } else {
          expandedSpaces.add(s.id);
          row.classList.add('open');
          sub.classList.add('open');
          populateSpaceBoardsSub(sub, s.id);
        }
        openSpaceMain(s.id);
      };

      list.appendChild(row);
      list.appendChild(sub);

      // If already expanded, populate immediately
      if (expandedSpaces.has(s.id)) {
        populateSpaceBoardsSub(sub, s.id);
      }
    }
  }

  async function populateSpaceBoardsSub(subEl, spaceId) {
    subEl.innerHTML = '';
    try {
      const space = await invoke('get_space_cmd', { spaceId });
      for (const boardId of (space.boards || [])) {
        const isLocal = boardId in allBoards;
        const title = isLocal ? allBoards[boardId] : boardId.slice(0, 12) + '\u2026';
        const li = document.createElement('li');
        li.textContent = title;
        li.dataset.boardId = boardId;
        if (!isLocal) li.style.opacity = '0.45';
        if (boardId === currentBoardId) li.classList.add('active');
        li.onclick = (e) => {
          e.stopPropagation();
          openBoardView(boardId, title);
        };
        subEl.appendChild(li);
      }
    } catch (_) {}
  }

  // ── Load all board titles once ─────────────────────────────────────────────
  async function refreshAllBoards() {
    const boards = await invoke('list_boards').catch(() => []);
    allBoards = {};
    for (const b of boards) allBoards[b.id] = b.title;
  }

  // ── Space main (boards grid) ───────────────────────────────────────────────
  async function openSpaceMain(spaceId) {
    currentSpaceId = spaceId;
    currentBoardId = null;
    showView('space-main');
    await Promise.all([refreshAllBoards(), refreshSpaceMain()]);
    await loadSpacesSidebar();
  }

  async function refreshSpaceMain() {
    const spaceId = currentSpaceId;
    try {
      const space = await invoke('get_space_cmd', { spaceId });
      if (spaceId !== currentSpaceId) return;
      currentSpaceData = space;
      document.getElementById('space-main-name').textContent = space.name;
      renderBoardsGrid(space);
    } catch (e) {
      console.error('Failed to load space:', e);
    }
  }

  function renderBoardsGrid(space) {
    const grid = document.getElementById('boards-grid');
    grid.innerHTML = '';

    if (!space.boards || space.boards.length === 0) {
      const empty = document.createElement('p');
      empty.className = 'boards-empty';
      empty.textContent = 'No boards in this space yet. Add one via Settings.';
      grid.appendChild(empty);
      return;
    }

    for (const boardId of space.boards) {
      const isLocal = boardId in allBoards;
      const title = isLocal ? allBoards[boardId] : boardId.slice(0, 16);
      const card = document.createElement('div');
      card.className = 'board-card';
      card.dataset.boardId = boardId;
      if (!isLocal) card.style.opacity = '0.45';

      const titleEl = document.createElement('div');
      titleEl.className = 'board-card-title';
      titleEl.textContent = title;

      const idEl = document.createElement('div');
      idEl.className = 'board-card-id';
      idEl.textContent = isLocal ? boardId.slice(0, 8) + '\u2026' : 'not synced';

      card.appendChild(titleEl);
      card.appendChild(idEl);
      card.onclick = () => openBoardView(boardId, title);
      grid.appendChild(card);
    }
  }

  // ── Board view ─────────────────────────────────────────────────────────────
  async function openBoardView(boardId, title) {
    currentBoardId = boardId;
    document.getElementById('board-view-title').textContent = title;
    showView('board-view');
    // Highlight in sidebar
    document.querySelectorAll('.space-boards-sub li').forEach(li => {
      li.classList.toggle('active', li.dataset.boardId === boardId);
    });
    await loadBoardColumns(boardId);
  }

  async function loadBoardColumns(boardId) {
    const area = document.getElementById('board-columns-area');
    area.innerHTML = '';
    try {
      const detail = await invoke('get_board_detail', { boardId });
      for (const col of detail.columns) {
        area.appendChild(buildColumnEl(detail.id, col));
      }
    } catch (e) {
      const isNotFound = String(e).includes('not found') || String(e).includes('NotFound');
      const wrap = document.createElement('div');
      wrap.style.cssText = 'padding:32px;display:flex;flex-direction:column;gap:10px;';
      const icon = document.createElement('div');
      icon.style.cssText = 'font-size:32px;opacity:0.25;';
      icon.textContent = '⬡';
      const title = document.createElement('div');
      title.style.cssText = 'color:#555;font-size:14px;font-weight:600;';
      title.textContent = isNotFound ? 'Board not available locally' : 'Failed to load board';
      const sub = document.createElement('div');
      sub.style.cssText = 'color:#3a3a4a;font-size:12px;max-width:320px;line-height:1.6;';
      sub.textContent = isNotFound
        ? 'This board is listed in the space but the data hasn\'t synced to this device yet. Board ID: ' + boardId
        : String(e);
      wrap.appendChild(icon);
      wrap.appendChild(title);
      wrap.appendChild(sub);
      area.appendChild(wrap);
    }
  }

  function buildColumnEl(boardId, col) {
    const colEl = document.createElement('div');
    colEl.className = 'board-col';
    colEl.dataset.colId = col.id;

    // Header
    const header = document.createElement('div');
    header.className = 'board-col-header';
    const titleSpan = document.createElement('span');
    titleSpan.textContent = col.title;
    const countBadge = document.createElement('span');
    countBadge.className = 'board-col-count';
    countBadge.textContent = col.cards.length;
    header.appendChild(titleSpan);
    header.appendChild(countBadge);

    // Cards list
    const cardsList = document.createElement('ul');
    cardsList.className = 'board-col-cards';
    for (const card of col.cards) {
      cardsList.appendChild(buildCardEl(card));
    }

    // Add card area
    const addArea = document.createElement('div');
    addArea.className = 'board-col-add';

    const addBtn = document.createElement('button');
    addBtn.className = 'btn-add-card';
    addBtn.textContent = '+ Add card';

    const addForm = document.createElement('div');
    addForm.className = 'col-add-form';
    const addInput = document.createElement('input');
    addInput.type = 'text';
    addInput.placeholder = 'Card title…';
    const addBtns = document.createElement('div');
    addBtns.className = 'col-add-form-btns';
    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'btn-primary';
    confirmBtn.textContent = 'Add';
    const cancelBtn = document.createElement('button');
    cancelBtn.textContent = 'Cancel';
    addBtns.appendChild(confirmBtn);
    addBtns.appendChild(cancelBtn);
    addForm.appendChild(addInput);
    addForm.appendChild(addBtns);

    addBtn.onclick = () => {
      addBtn.style.display = 'none';
      addForm.classList.add('open');
      addInput.focus();
    };
    cancelBtn.onclick = () => {
      addForm.classList.remove('open');
      addBtn.style.display = '';
      addInput.value = '';
    };
    confirmBtn.onclick = async () => {
      const title = addInput.value.trim();
      if (!title) return;
      try {
        await invoke('create_card_cmd', { boardId, colId: col.id, title });
        addInput.value = '';
        addForm.classList.remove('open');
        addBtn.style.display = '';
        await loadBoardColumns(boardId);
        // refresh sidebar board title cache (card count changed)
      } catch (e) { alert('Error adding card: ' + e); }
    };
    addInput.onkeydown = (e) => {
      if (e.key === 'Enter') confirmBtn.click();
      if (e.key === 'Escape') cancelBtn.click();
    };

    addArea.appendChild(addBtn);
    addArea.appendChild(addForm);

    colEl.appendChild(header);
    colEl.appendChild(cardsList);
    colEl.appendChild(addArea);
    return colEl;
  }

  function buildCardEl(card) {
    const li = document.createElement('li');
    li.className = 'kanban-card';

    const titleEl = document.createElement('div');
    titleEl.className = 'kanban-card-title';
    titleEl.textContent = card.title;

    li.appendChild(titleEl);

    if (card.number) {
      const numEl = document.createElement('div');
      numEl.className = 'kanban-card-num';
      numEl.textContent = '#' + card.number;
      li.appendChild(numEl);
    }

    return li;
  }

  // ── Space settings (members / boards / invite) ─────────────────────────────
  async function openSpaceSettings() {
    showView('space-settings');
    await refreshSpaceSettings();
  }

  async function refreshSpaceSettings() {
    const spaceId = currentSpaceId;
    try {
      const space = await invoke('get_space_cmd', { spaceId });
      if (spaceId !== currentSpaceId) return;
      currentSpaceData = space;
      document.getElementById('space-panel-name').textContent = space.name;
      renderMembersTab(space);
      renderBoardsTab(space);
      await renderInviteTab();
    } catch (e) {
      console.error('Failed to load space settings:', e);
    }
  }

  function renderMembersTab(space) {
    const myPubkey = window._myPubkey || '';
    const isOwner = space.owner_pubkey === myPubkey;
    const ul = document.getElementById('space-members-list');
    ul.innerHTML = '';
    for (const m of space.members) {
      const li = document.createElement('li');
      if (m.kicked) li.classList.add('member-kicked');

      const avatar = document.createElement('div');
      avatar.className = 'member-avatar';
      avatar.textContent = (m.display_name || m.pubkey).charAt(0).toUpperCase();

      const info = document.createElement('div');
      info.className = 'member-info';
      const nameEl = document.createElement('div');
      nameEl.className = 'member-name';
      nameEl.textContent = m.display_name || '(unnamed)';
      const pkEl = document.createElement('div');
      pkEl.className = 'member-pubkey';
      pkEl.textContent = m.pubkey.slice(0, 20) + '\u2026';
      info.appendChild(nameEl);
      info.appendChild(pkEl);
      li.appendChild(avatar);
      li.appendChild(info);

      if (isOwner && !m.kicked && m.pubkey !== myPubkey) {
        const btn = document.createElement('button');
        btn.className = 'btn-kick btn-small';
        btn.textContent = 'Kick';
        btn.dataset.pubkey = m.pubkey;
        li.appendChild(btn);
      }
      ul.appendChild(li);
    }
    ul.querySelectorAll('.btn-kick').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm('Kick ' + btn.dataset.pubkey.slice(0, 16) + '\u2026?')) return;
        try {
          await invoke('kick_member_cmd', { spaceId: currentSpaceId, pubkey: btn.dataset.pubkey });
          await refreshSpaceSettings();
        } catch (e) { alert('Error kicking member: ' + e); }
      };
    });
  }

  function renderBoardsTab(space) {
    const ul = document.getElementById('space-boards-list');
    ul.innerHTML = '';
    for (const boardId of space.boards) {
      const li = document.createElement('li');
      const span = document.createElement('span');
      span.style.cssText = 'font-family:monospace;font-size:12px;';
      span.textContent = (allBoards[boardId] || boardId.slice(0, 12) + '\u2026');
      const btn = document.createElement('button');
      btn.className = 'btn-remove-board btn-small btn-danger';
      btn.textContent = 'Remove';
      btn.dataset.board = boardId;
      li.appendChild(span);
      li.appendChild(btn);
      ul.appendChild(li);
    }
    ul.querySelectorAll('.btn-remove-board').forEach(btn => {
      btn.onclick = async () => {
        try {
          await invoke('remove_board_from_space', { spaceId: currentSpaceId, boardId: btn.dataset.board });
          await refreshSpaceSettings();
          await refreshSpaceMain();
        } catch (e) { alert('Error removing board: ' + e); }
      };
    });
  }

  async function renderInviteTab() {
    const token = await invoke('get_invite_qr', { spaceId: currentSpaceId }).catch(() => null);
    const tokenSection = document.getElementById('invite-token-section');
    const noInviteSection = document.getElementById('no-invite-section');
    if (token) {
      tokenSection.style.display = 'block';
      noInviteSection.style.display = 'none';
      document.getElementById('invite-token-input').value = token;
      const qrDiv = document.getElementById('invite-qr');
      qrDiv.innerHTML = '';
      if (window.QRCode) {
        new QRCode(qrDiv, { text: token, width: 160, height: 160, colorDark: '#c8962a', colorLight: '#0d0d1a' });
      }
    } else {
      tokenSection.style.display = 'none';
      noInviteSection.style.display = 'block';
    }
  }

  // ── Tab switching ──────────────────────────────────────────────────────────
  document.querySelectorAll('.space-tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.space-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.space-tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    };
  });

  // ── Navigation buttons ─────────────────────────────────────────────────────
  // Back to empty dashboard
  document.getElementById('btn-back-to-boards').onclick = () => {
    currentSpaceId = null;
    currentBoardId = null;
    showView('dashboard');
    loadSpacesSidebar();
  };
  // Settings button in space main
  document.getElementById('btn-space-settings').onclick = () => openSpaceSettings();
  // Back from settings to boards grid
  document.getElementById('btn-settings-back').onclick = () => {
    showView('space-main');
    renderBoardsGrid(currentSpaceData || { boards: [] });
  };
  // Back from board view to boards grid
  document.getElementById('btn-back-to-space').onclick = () => {
    currentBoardId = null;
    showView('space-main');
    renderBoardsGrid(currentSpaceData || { boards: [] });
    document.querySelectorAll('.space-boards-sub li').forEach(li => li.classList.remove('active'));
  };

  // Add column button
  document.getElementById('btn-add-column').onclick = async () => {
    const title = prompt('Column name:');
    if (!title || !title.trim() || !currentBoardId) return;
    try {
      await invoke('create_column_cmd', { boardId: currentBoardId, title: title.trim() });
      await loadBoardColumns(currentBoardId);
    } catch (e) { alert('Error creating column: ' + e); }
  };

  // ── New Space modal ────────────────────────────────────────────────────────
  document.getElementById('btn-new-space').onclick = () => {
    document.getElementById('input-space-name').value = '';
    openModal('modal-create-space');
    document.getElementById('input-space-name').focus();
  };
  document.getElementById('btn-create-space-cancel').onclick = () => closeModal('modal-create-space');
  document.getElementById('btn-create-space-confirm').onclick = async () => {
    const name = document.getElementById('input-space-name').value.trim();
    if (!name) return;
    try {
      const space = await invoke('create_space', { name });
      closeModal('modal-create-space');
      await loadSpacesSidebar();
      await openSpaceMain(space.id);
    } catch (e) { alert('Error: ' + e); }
  };

  // ── Import Invite (Join Space) ─────────────────────────────────────────────
  document.getElementById('btn-import-invite-sidebar').onclick = () => {
    document.getElementById('input-invite-token').value = '';
    openModal('modal-import-invite');
    document.getElementById('input-invite-token').focus();
  };
  document.getElementById('btn-import-invite-cancel').onclick = () => closeModal('modal-import-invite');
  document.getElementById('btn-import-invite-confirm').onclick = async () => {
    const tokenOrPath = document.getElementById('input-invite-token').value.trim();
    if (!tokenOrPath) return;
    try {
      const space = await invoke('import_invite', { tokenOrPath });
      closeModal('modal-import-invite');
      await loadSpacesSidebar();
      await openSpaceMain(space.id);
    } catch (e) { alert('Error joining space: ' + e); }
  };

  // ── Invite tab actions ─────────────────────────────────────────────────────
  document.getElementById('btn-generate-invite').onclick = async () => {
    try {
      await invoke('generate_invite', { spaceId: currentSpaceId });
      await renderInviteTab();
    } catch (e) { alert('Error: ' + e); }
  };
  document.getElementById('btn-copy-token').onclick = () => {
    navigator.clipboard.writeText(document.getElementById('invite-token-input').value).catch(() => {});
  };
  document.getElementById('btn-revoke-invite').onclick = async () => {
    try {
      await invoke('revoke_invite', { spaceId: currentSpaceId });
      await invoke('generate_invite', { spaceId: currentSpaceId });
      await renderInviteTab();
    } catch (e) { alert('Error: ' + e); }
  };
  document.getElementById('btn-export-invite').onclick = async () => {
    const path = prompt('Save .space file to path (e.g. /tmp/myteam.space):');
    if (!path) return;
    try {
      await invoke('export_invite_file', { spaceId: currentSpaceId, path });
      alert('Exported to ' + path);
    } catch (e) { alert('Error: ' + e); }
  };

  // ── Add board to space ─────────────────────────────────────────────────────
  document.getElementById('btn-add-board-to-space').onclick = async () => {
    const boardId = document.getElementById('input-board-id-to-add').value.trim();
    if (!boardId) return;
    try {
      await invoke('add_board_to_space', { spaceId: currentSpaceId, boardId });
      document.getElementById('input-board-id-to-add').value = '';
      await refreshAllBoards();
      await refreshSpaceSettings();
      await refreshSpaceMain();
    } catch (e) { alert('Error: ' + e); }
  };

  // ── Profile modal ──────────────────────────────────────────────────────────
  document.getElementById('btn-profile').onclick = async () => {
    try {
      const profile = await invoke('get_my_profile');
      window._myPubkey = profile.pubkey;
      document.getElementById('profile-pubkey-short').textContent = profile.pubkey.slice(0, 32) + '\u2026';
      document.getElementById('profile-pubkey-short')._fullPubkey = profile.pubkey;
      document.getElementById('input-display-name').value = profile.display_name || '';
      document.getElementById('input-ssh-key-path').value = profile.ssh_key_path || '';
      openModal('modal-profile');
    } catch (e) { alert('Error loading profile: ' + e); }
  };
  document.getElementById('btn-copy-pubkey').onclick = () => {
    const pk = document.getElementById('profile-pubkey-short')._fullPubkey;
    if (pk) navigator.clipboard.writeText(pk).catch(() => {});
  };
  document.getElementById('btn-import-ssh').onclick = async () => {
    const path = document.getElementById('input-ssh-key-path').value.trim() || null;
    try {
      const pubkey = await invoke('import_ssh_key', { path });
      document.getElementById('profile-pubkey-short').textContent = pubkey.slice(0, 32) + '\u2026';
      document.getElementById('profile-pubkey-short')._fullPubkey = pubkey;
      window._myPubkey = pubkey;
      alert('SSH key imported.');
    } catch (e) { alert('Error importing SSH key: ' + e); }
  };
  document.getElementById('btn-save-profile').onclick = async () => {
    const displayName = document.getElementById('input-display-name').value.trim();
    try {
      const existing = await invoke('get_my_profile').catch(() => null);
      await invoke('update_my_profile', {
        displayName,
        avatarB64: existing?.avatar_b64 ?? null,
      });
      closeModal('modal-profile');
    } catch (e) { alert('Error saving profile: ' + e); }
  };
  document.getElementById('btn-close-profile').onclick = () => closeModal('modal-profile');

  // ── Init ───────────────────────────────────────────────────────────────────
  async function init() {
    const profile = await invoke('get_my_profile').catch(() => null);
    if (profile) window._myPubkey = profile.pubkey;
    await refreshAllBoards();
    await loadSpacesSidebar();
    showView('dashboard');
  }

  init();
</script>
</body>
</html>
