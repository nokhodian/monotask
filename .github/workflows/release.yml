name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build CLI macOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact: monotask-${{ github.ref_name }}-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            artifact: monotask-${{ github.ref_name }}-x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p monotask-cli
      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/app-cli ./monotask
          tar -czf ${{ matrix.artifact }}.tar.gz monotask
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  build-linux:
    name: Build CLI Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install musl tools
        run: sudo apt-get install -y musl-tools
      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Build CLI
        run: cargo build --release --target x86_64-unknown-linux-musl -p monotask-cli
      - name: Package
        run: |
          cp target/x86_64-unknown-linux-musl/release/app-cli ./monotask
          tar -czf monotask-${{ github.ref_name }}-x86_64-linux.tar.gz monotask
          sha256sum monotask-${{ github.ref_name }}-x86_64-linux.tar.gz > monotask-${{ github.ref_name }}-x86_64-linux.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: monotask-${{ github.ref_name }}-x86_64-linux
          path: |
            monotask-${{ github.ref_name }}-x86_64-linux.tar.gz
            monotask-${{ github.ref_name }}-x86_64-linux.tar.gz.sha256

  build-cli-windows:
    name: Build CLI Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build CLI
        run: cargo build --release --target x86_64-pc-windows-msvc -p monotask-cli
      - name: Package
        shell: bash
        run: |
          cp target/x86_64-pc-windows-msvc/release/app-cli.exe ./monotask.exe
          7z a monotask-${{ github.ref_name }}-x86_64-windows.zip monotask.exe
          sha256sum monotask-${{ github.ref_name }}-x86_64-windows.zip > monotask-${{ github.ref_name }}-x86_64-windows.zip.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: monotask-${{ github.ref_name }}-x86_64-windows
          path: |
            monotask-${{ github.ref_name }}-x86_64-windows.zip
            monotask-${{ github.ref_name }}-x86_64-windows.zip.sha256

  build-desktop-windows:
    name: Build Desktop App (Windows x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2
      - name: Build desktop app
        working-directory: crates/monotask-tauri
        run: tauri build --target x86_64-pc-windows-msvc
      - name: Collect and rename installer
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          EXE=$(find target/x86_64-pc-windows-msvc/release/bundle/nsis -name "*-setup.exe" | head -1)
          DEST="Monotask-${VERSION}-x64-setup.exe"
          cp "$EXE" "$DEST"
          sha256sum "$DEST" > "$DEST.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: monotask-desktop-${{ github.ref_name }}-windows-x64
          path: |
            Monotask-*-setup.exe
            Monotask-*-setup.exe.sha256

  build-desktop-macos:
    name: Build Desktop App (macOS arm64 DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2
      - name: Build desktop app
        working-directory: crates/monotask-tauri
        run: tauri build --target aarch64-apple-darwin
      - name: Collect and rename DMG
        run: |
          VERSION="${{ github.ref_name }}"
          DMG=$(find target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          DEST="Monotask-${VERSION}-aarch64.dmg"
          cp "$DMG" "$DEST"
          shasum -a 256 "$DEST" > "$DEST.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: monotask-desktop-${{ github.ref_name }}-aarch64
          path: |
            Monotask-*.dmg
            Monotask-*.dmg.sha256

  release:
    name: Create GitHub Release
    needs: [build-macos, build-linux, build-cli-windows, build-desktop-macos, build-desktop-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} dist/*.tar.gz dist/*.zip dist/*.sha256 dist/*.dmg dist/*-setup.exe \
            --title "Monotask ${{ github.ref_name }}" \
            --notes "$(cat <<'EOF'
          ## Monotask ${{ github.ref_name }}

          ### Desktop App (macOS) — via Homebrew
          \`\`\`
          brew tap nokhodian/tap
          brew install --cask monotask
          \`\`\`

          ### CLI — via Homebrew
          \`\`\`
          brew tap nokhodian/tap
          brew install monotask
          \`\`\`

          ### Manual install
          | Platform | Download |
          |----------|----------|
          | macOS Desktop (Apple Silicon) | \`Monotask-${{ github.ref_name }}-aarch64.dmg\` |
          | Windows Desktop (x64) | \`Monotask-${{ github.ref_name }}-x64-setup.exe\` |
          | Windows CLI (x64) | \`monotask-${{ github.ref_name }}-x86_64-windows.zip\` |
          | macOS CLI (Apple Silicon) | \`monotask-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz\` |
          | macOS CLI (Intel) | \`monotask-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz\` |
          | Linux x86_64 CLI | \`monotask-${{ github.ref_name }}-x86_64-linux.tar.gz\` |
          EOF
          )"

  update-homebrew:
    name: Update Homebrew Formula (CLI)
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Compute SHAs
        id: sha
        run: |
          echo "arm64=$(cat dist/monotask-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz.sha256 | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "x86=$(cat dist/monotask-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz.sha256 | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux=$(cat dist/monotask-${{ github.ref_name }}-x86_64-linux.tar.gz.sha256 | awk '{print $1}')" >> $GITHUB_OUTPUT
      - name: Update formula in homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_PLAIN="${VERSION#v}"
          ARM64_SHA="${{ steps.sha.outputs.arm64 }}"
          X86_SHA="${{ steps.sha.outputs.x86 }}"
          LINUX_SHA="${{ steps.sha.outputs.linux }}"

          FORMULA="class Monotask < Formula
            desc \"P2P Kanban CLI – local-first task management with collaboration\"
            homepage \"https://github.com/nokhodian/monotask\"
            version \"${VERSION_PLAIN}\"
            license \"MIT\"

            on_macos do
              on_arm do
                url \"https://github.com/nokhodian/monotask/releases/download/${VERSION}/monotask-${VERSION}-aarch64-apple-darwin.tar.gz\"
                sha256 \"${ARM64_SHA}\"
              end
              on_intel do
                url \"https://github.com/nokhodian/monotask/releases/download/${VERSION}/monotask-${VERSION}-x86_64-apple-darwin.tar.gz\"
                sha256 \"${X86_SHA}\"
              end
            end

            on_linux do
              url \"https://github.com/nokhodian/monotask/releases/download/${VERSION}/monotask-${VERSION}-x86_64-linux.tar.gz\"
              sha256 \"${LINUX_SHA}\"
            end

            def install
              bin.install \"monotask\"
            end

            test do
              assert_match \"MONOTASK CLI\", shell_output(\"#{bin}/monotask ai-help\")
            end
          end"

          FILE_SHA=$(gh api repos/nokhodian/homebrew-tap/contents/Formula/monotask.rb \
            --jq '.sha' 2>/dev/null || echo "")

          if [ -z "$FILE_SHA" ]; then
            gh api repos/nokhodian/homebrew-tap/contents/Formula/monotask.rb \
              --method PUT \
              --field message="Update monotask CLI to ${VERSION}" \
              --field content="$(echo "$FORMULA" | base64 -w0)"
          else
            gh api repos/nokhodian/homebrew-tap/contents/Formula/monotask.rb \
              --method PUT \
              --field message="Update monotask CLI to ${VERSION}" \
              --field content="$(echo "$FORMULA" | base64 -w0)" \
              --field sha="$FILE_SHA"
          fi

  update-homebrew-cask:
    name: Update Homebrew Cask (Desktop App)
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Compute DMG SHA
        id: sha
        run: |
          echo "dmg=$(cat dist/Monotask-${{ github.ref_name }}-aarch64.dmg.sha256 | awk '{print $1}')" >> $GITHUB_OUTPUT
      - name: Update Cask in homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_PLAIN="${VERSION#v}"
          DMG_SHA="${{ steps.sha.outputs.dmg }}"

          CASK="cask \"monotask\" do
            version \"${VERSION_PLAIN}\"
            sha256 \"${DMG_SHA}\"

            url \"https://github.com/nokhodian/monotask/releases/download/${VERSION}/Monotask-${VERSION}-aarch64.dmg\"
            name \"Monotask\"
            desc \"Local-first peer-to-peer kanban board with cryptographic identity\"
            homepage \"https://github.com/nokhodian/monotask\"

            depends_on macos: \">= :ventura\"

            app \"Monotask.app\"

            caveats <<~EOS
              Monotask is not code-signed. If macOS blocks it on first launch, run:
                xattr -cr /Applications/Monotask.app
              Then try opening it again.
            EOS

            zap trash: [
              \"~/.local/share/p2p-kanban\",
              \"~/Library/Application Support/dev.monotask\",
              \"~/Library/Preferences/dev.monotask.plist\",
              \"~/Library/Saved Application State/dev.monotask.savedState\",
            ]
          end"

          FILE_SHA=$(gh api repos/nokhodian/homebrew-tap/contents/Casks/monotask.rb \
            --jq '.sha' 2>/dev/null || echo "")

          if [ -z "$FILE_SHA" ]; then
            gh api repos/nokhodian/homebrew-tap/contents/Casks/monotask.rb \
              --method PUT \
              --field message="Update Monotask desktop app to ${VERSION}" \
              --field content="$(echo "$CASK" | base64 -w0)"
          else
            gh api repos/nokhodian/homebrew-tap/contents/Casks/monotask.rb \
              --method PUT \
              --field message="Update Monotask desktop app to ${VERSION}" \
              --field content="$(echo "$CASK" | base64 -w0)" \
              --field sha="$FILE_SHA"
          fi
