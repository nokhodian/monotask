name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact: monotask-${{ github.ref_name }}-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            artifact: monotask-${{ github.ref_name }}-x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p kanban-cli
      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/app-cli ./monotask
          tar -czf ${{ matrix.artifact }}.tar.gz monotask
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install musl tools
        run: sudo apt-get install -y musl-tools
      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Build CLI
        run: cargo build --release --target x86_64-unknown-linux-musl -p kanban-cli
      - name: Package
        run: |
          cp target/x86_64-unknown-linux-musl/release/app-cli ./monotask
          tar -czf monotask-${{ github.ref_name }}-x86_64-linux.tar.gz monotask
          sha256sum monotask-${{ github.ref_name }}-x86_64-linux.tar.gz > monotask-${{ github.ref_name }}-x86_64-linux.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: monotask-${{ github.ref_name }}-x86_64-linux
          path: |
            monotask-${{ github.ref_name }}-x86_64-linux.tar.gz
            monotask-${{ github.ref_name }}-x86_64-linux.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} dist/*.tar.gz dist/*.sha256 \
            --title "Monotask ${{ github.ref_name }}" \
            --notes "$(cat <<'EOF'
          ## Monotask ${{ github.ref_name }}

          ### Install via Homebrew
          \`\`\`
          brew tap nokhodian/tap
          brew install monotask
          \`\`\`

          ### Manual install
          Download the archive for your platform, extract, and place `monotask` in your PATH.

          | Platform | Archive |
          |----------|---------|
          | macOS Apple Silicon | \`monotask-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz\` |
          | macOS Intel | \`monotask-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz\` |
          | Linux x86_64 | \`monotask-${{ github.ref_name }}-x86_64-linux.tar.gz\` |
          EOF
          )"

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Compute SHAs
        id: sha
        run: |
          echo "arm64=$(cat dist/monotask-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz.sha256 | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "x86=$(cat dist/monotask-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz.sha256 | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux=$(cat dist/monotask-${{ github.ref_name }}-x86_64-linux.tar.gz.sha256 | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "ver=${{ github.ref_name }}" | sed 's/v//' >> $GITHUB_OUTPUT
      - name: Update formula in homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_PLAIN="${VERSION#v}"
          ARM64_SHA="${{ steps.sha.outputs.arm64 }}"
          X86_SHA="${{ steps.sha.outputs.x86 }}"
          LINUX_SHA="${{ steps.sha.outputs.linux }}"

          FORMULA="class Monotask < Formula
            desc \"P2P Kanban CLI – local-first task management with collaboration\"
            homepage \"https://github.com/nokhodian/monotask\"
            version \"${VERSION_PLAIN}\"
            license \"MIT\"

            on_macos do
              on_arm do
                url \"https://github.com/nokhodian/monotask/releases/download/${VERSION}/monotask-${VERSION}-aarch64-apple-darwin.tar.gz\"
                sha256 \"${ARM64_SHA}\"
              end
              on_intel do
                url \"https://github.com/nokhodian/monotask/releases/download/${VERSION}/monotask-${VERSION}-x86_64-apple-darwin.tar.gz\"
                sha256 \"${X86_SHA}\"
              end
            end

            on_linux do
              url \"https://github.com/nokhodian/monotask/releases/download/${VERSION}/monotask-${VERSION}-x86_64-linux.tar.gz\"
              sha256 \"${LINUX_SHA}\"
            end

            def install
              bin.install \"monotask\"
            end

            test do
              assert_match \"MONOTASK CLI\", shell_output(\"#{bin}/monotask ai-help\")
            end
          end"

          # Get current file SHA for update API
          FILE_SHA=$(gh api repos/nokhodian/homebrew-tap/contents/Formula/monotask.rb \
            --jq '.sha' 2>/dev/null || echo "")

          if [ -z "$FILE_SHA" ]; then
            # Create new file
            gh api repos/nokhodian/homebrew-tap/contents/Formula/monotask.rb \
              --method PUT \
              --field message="Update monotask to ${VERSION}" \
              --field content="$(echo "$FORMULA" | base64 -w0)"
          else
            # Update existing file
            gh api repos/nokhodian/homebrew-tap/contents/Formula/monotask.rb \
              --method PUT \
              --field message="Update monotask to ${VERSION}" \
              --field content="$(echo "$FORMULA" | base64 -w0)" \
              --field sha="$FILE_SHA"
          fi
